# Build Windows GUI executable on release
name: Build Windows GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to rebuild (for example: v0.5.0-beta)'
        required: true
        type: string

jobs:
  build-windows-gui:
    name: Build Windows GUI Executable
    runs-on: ubuntu-latest  # Build on Linux using cross-compilation
    permissions:
      contents: write  # Permission to create releases

    steps:
      - name: Resolve Build Metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "ERROR: Could not determine release tag"
            exit 1
          fi

          # Gogio expects numeric semantic version: major.minor.patch.versioncode
          BASE_VERSION=$(echo "$TAG" | sed -E 's/^v//; s/-.*$//')
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            BASE_VERSION="0.0.0"
          fi
          GOGIO_VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"

          PRERELEASE=false
          if echo "$TAG" | grep -Eiq 'alpha|beta|rc'; then
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "gogio_version=$GOGIO_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

          echo "Release tag: $TAG"
          echo "Gogio version: $GOGIO_VERSION"
          echo "Prerelease: $PRERELEASE"

      - name: Checkout Repository (Manual Tag Rebuild)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.meta.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - name: Checkout Repository (Tag Push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate Tag Exists
        run: |
          git rev-parse "refs/tags/${{ steps.meta.outputs.tag }}" >/dev/null

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          cache: true

      - name: Install gogio
        run: |
          export GOWORK=off
          go install gioui.org/cmd/gogio@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          command -v gogio
          gogio -h >/dev/null
        
      - name: Build Windows GUI (64-bit)
        run: |
          export GOWORK=off
          export PATH="$(go env GOPATH)/bin:$PATH"
          mkdir -p builds
          gogio \
            -arch amd64 \
            -target windows \
            -version "${{ steps.meta.outputs.gogio_version }}" \
            -icon icon.png \
            -o "builds/c7client-gui-windows-amd64.exe" \
            ./cmd/bedrocktool
          
          # Verify build output
          if [ ! -f "builds/c7client-gui-windows-amd64.exe" ]; then
            echo "ERROR: Executable file not created!"
            exit 1
          fi
          
          ls -lh builds/c7client-gui-windows-amd64.exe

      - name: Create Checksums
        run: |
          cd builds
          sha256sum c7client-gui-windows-amd64.exe > checksums.txt
          cat checksums.txt

      - name: Create Release Notes
        id: release_notes
        run: |
          cat > release_notes.md << EOF
          # C7 CLIENT Windows GUI ${{ steps.meta.outputs.tag }}

          ## Installation

          1. Download `c7client-gui-windows-amd64.exe`
          2. Double-click to run (no installation needed)
          3. Configure your Bedrock server connection

          ## System Requirements

          - Windows 7 SP1 or later
          - RAM: 512 MB minimum (1 GB recommended)
          - Internet connection for server connectivity

          ## Features

          ✅ Modern graphical interface  
          ✅ Player tracking with compass  
          ✅ Real-time server status  
          ✅ Module-based extensibility  
          ✅ No external dependencies  

          ## SHA-256 Checksum

          For verification:
          \`\`\`
          $(cat checksums.txt)
          \`\`\`

          ## Documentation

          - [Quick Start Guide](../../QUICKSTART_WINDOWS.md)
          - [Full Build Guide](../../WINDOWS_GUI_BUILD.md)
          - [Framework Documentation](../../C7_FRAMEWORK.md)
          - [Player Tracking](../../PLAYER_TRACKING.md)

          ## Troubleshooting

          **Won't open?**
          - Ensure Windows Defender/antivirus allows execution
          - Run as Administrator if needed
          - Check internet connectivity

          **Need to build yourself?**
          - See [WINDOWS_GUI_BUILD.md](../../WINDOWS_GUI_BUILD.md) for instructions

          ## Build Metadata

          - Release tag: ${{ steps.meta.outputs.tag }}
          - Build version (gogio): ${{ steps.meta.outputs.gogio_version }}

          ---
          Built with Go and Gio
          EOF
          
          cat release_notes.md

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: |
            builds/c7client-gui-windows-amd64.exe
            builds/checksums.txt
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "=== Build Complete ==="
          echo "Release tag: ${{ steps.meta.outputs.tag }}"
          echo "Build version: ${{ steps.meta.outputs.gogio_version }}"
          echo "Executable: builds/c7client-gui-windows-amd64.exe"
          ls -lh builds/
          echo ""
          echo "The executable has been uploaded to the GitHub release."
